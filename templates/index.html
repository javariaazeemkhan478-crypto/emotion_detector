<!DOCTYPE html>
<html>
<head>
    <title>Emotion Detector</title>
</head>
<body>
    <h1>Emotion Detector</h1>
    <input type="text" id="textToAnalyze" placeholder="Enter text here">
    <button onclick="RunSentimentAnalysis()">Analyze</button>
    <div id="system_response"></div>

    <script>
        function RunSentimentAnalysis() {
            let textToAnalyze = document.getElementById("textToAnalyze").value;
            fetch("/emotionDetector?textToAnalyze=" + encodeURIComponent(textToAnalyze))
                .then(response => response.text())
                .then(data => {
                    document.getElementById("system_response").innerText = data;
                });
        }
    </script>
</body>
</html>
